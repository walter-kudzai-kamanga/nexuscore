version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexuscore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  nexuscore:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql+psycopg2://nexus:nexus@postgres:5432/nexuscore
      NEXUS_SERVICE_API_KEY_FILE: /run/secrets/nexus_service_api_key
      NEXUS_SECRET_KEY_FILE: /run/secrets/nexus_secret_key
      NEXUS_BOOTSTRAP_USERS_JSON_FILE: /run/secrets/nexus_bootstrap_users_json
      NEXUS_COOKIE_SECURE: "false"
      NEXUS_AUTO_MIGRATE: "true"
      NEXUS_AUTO_MIGRATE_WITH_LOCK: "true"
      NEXUS_ENABLE_DEMO_MODE: ${NEXUS_ENABLE_DEMO_MODE:-false}
      NEXUS_DEMO_HEARTBEAT_INTERVAL_SECONDS: ${NEXUS_DEMO_HEARTBEAT_INTERVAL_SECONDS:-8}
      NEXUS_DEMO_RECOVERY_DELAY_SECONDS: ${NEXUS_DEMO_RECOVERY_DELAY_SECONDS:-5}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    secrets:
      - nexus_service_api_key
      - nexus_secret_key
      - nexus_bootstrap_users_json

secrets:
  nexus_service_api_key:
    file: .secrets/nexus_service_api_key.txt
  nexus_secret_key:
    file: .secrets/nexus_secret_key.txt
  nexus_bootstrap_users_json:
    file: .secrets/nexus_bootstrap_users_json.json
